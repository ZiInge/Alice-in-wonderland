# Board: ESP32-S3 DevKitC-1 (Espressif)
# Definition: definitions/boards/esp32-s3-devkitc-1/manifest.yaml

esphome:
  name: alice-controller
  friendly_name: Alice Controller

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "UnyasmMQk930Ns2TDreUFXBgnlBSiE9khM5BhTUAa4I="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Alice Controlle Fallback Hotspot
    password: "P4iEhfRQ8a2f"

captive_portal:

sensor:
  - platform: wifi_signal
    name: "Alice WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Alice Uptime"

  - platform: adc
    pin: GPIO5
    name: "Alice Actuator Feedback Voltage"
    id: alice_actuator_feedback_voltage
    attenuation: 12db
    update_interval: 500ms

  - platform: template
    name: "Alice Door Position"
    id: alice_door_position
    icon: mdi:garage
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 500ms
    lambda: |-
      float voltage = id(alice_actuator_feedback_voltage).state;

      // Clamp to calibrated range
      if (voltage < 0.08f) voltage = 0.08f;
      if (voltage > 3.15f) voltage = 3.15f;

      // Retracted = 0%
      // Extended = 100%
      float position = (3.15f - voltage) / (3.15f - 0.08f);

      // Final safety clamp
      if (position < 0.0f) position = 0.0f;
      if (position > 1.0f) position = 1.0f;

      return position * 100.0f;

text_sensor:
  - platform: version
    name: "Alice Firmware"

  - platform: wifi_info
    ip_address:
      name: "Alice IP Address"
    ssid:
      name: "Alice Connected WiFi"

button:
  - platform: restart
    name: "Alice Restart Controller"

  - platform: template
    name: "Alice Actuator Retract"
    on_press:
      - logger.log: "RETRACT command sent"
      - servo.write:
          id: alice_servo
          level: -100%

  - platform: template
    name: "Alice Actuator Extend"
    on_press:
      - logger.log: "EXTEND command sent"
      - servo.write:
          id: alice_servo
          level: 100%

output:
  - platform: ledc
    pin: GPIO18
    id: alice_pwm_output
    frequency: 50Hz

servo:
  - id: alice_servo
    output: alice_pwm_output
    min_level: 5%
    idle_level: 7.5%
    max_level: 10%